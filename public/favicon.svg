<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="22" fill="#22c55e"/>
  <g transform="translate(50,50)" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- stethoscope head -->
    <circle cx="0" cy="14" r="8" stroke-width="4.5"/>
    <!-- tube left -->
    <path d="M-14,-18 Q-26,-18 -26,-6 Q-26,6 -14,6"/>
    <!-- tube right -->
    <path d="M14,-18 Q26,-18 26,-6 Q26,6 14,6"/>
    <!-- center bar -->
    <line x1="-14" y1="-18" x2="14" y2="-18"/>
    <!-- stem down -->
    <line x1="0" y1="6" x2="0" y2="14"/>
    <!-- ear tips -->
    <circle cx="-14" cy="-20" r="3" fill="white" stroke="none"/>
    <circle cx="14" cy="-20" r="3" fill="white" stroke="none"/>
  </g>
</svg>
